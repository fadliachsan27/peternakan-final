<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <title>Pengajuan Masyarakat - Web Peternakan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SKD Zoonosis" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <link href="/assets/libs/@iconscout/unicons/css/line.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/icons.css">
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="/css/custom.css?v=1789400000">
</head>

<body class="bg-slate-50 min-h-screen">

  <!-- Preloader -->
  <div id="preloader">
    <div class="loader-spinner"></div>
  </div>

  <div class="app-shell">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <aside class="sidebar app-sidebar animate-fade-in" id="appSidebar"></aside>

    <div class="app-main">
      <header class="app-topbar">
        <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
        <div id="appTopbar" class="flex-1"></div>
      </header>

      <main class="p-4 md:p-6 animate-fade-in-up">
        <div class="mb-4">
          <h1 class="text-lg font-semibold text-slate-700">Pengajuan dari Masyarakat</h1>
          <p class="text-sm text-slate-400">Setujui pengajuan untuk otomatis menambahkan ke data kasus</p>
        </div>
        <div class="panel">
          <div class="table-wrap">
            <table class="data-table pengajuan-table">
              <thead>
                <tr>
                  <th>No</th>
                  <th>Tanggal</th>
                  <th>Pelapor</th>
                  <th>Kecamatan</th>
                  <th>Gejala</th>
                  <th>Alamat</th>
                  <th>Koordinat</th>
                  <th>Foto</th>
                  <th>Kronologis</th>
                  <th>Status</th>
                  <th>Aksi</th>
                  <th>Tindakan</th>
                  <th>Pengajuan</th>
                </tr>
              </thead>
              <tbody id="tablePengajuan"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/api.js?v=1789400000"></script>
  <script src="/js/hando-modal.js?v=1789400000"></script>
  <script src="/js/layout.js?v=1789400000"></script>
  <script src="/js/pengajuan-admin.js?v=1789400000"></script>
  <script>
    (function () {
      if (!requireAuth()) throw new Error('auth');
      renderSidebar('appSidebar', { mode: 'admin', active: 'notifikasi' });
      renderTopbar('appTopbar', { mode: 'admin' });
      applyLoggedInUserBadge();
    })();
  </script>
  <script src="/js/pwa-register.js"></script>
</body>

</html>
