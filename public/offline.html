<!doctype html>
<html lang="id">

<head>
  <script src="/js/theme.js"></script>
    <meta charset="utf-8" />
    <title>Offline - SKD Zoonosis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d3b66" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            color: #1e293b;
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 0.9rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            padding: 2.2rem 1.8rem;
            max-width: 380px;
            width: 100%;
            text-align: center;
        }

        .icon-wrap {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.1rem;
            border-radius: 50%;
            background: #eff6ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrap svg {
            width: 30px;
            height: 30px;
        }

        h1 {
            font-size: 1.15rem;
            margin: 0 0 0.5rem;
            color: #0f172a;
        }

        p {
            font-size: 0.88rem;
            color: #64748b;
            margin: 0 0 1.4rem;
            line-height: 1.5;
        }

        button {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.65rem 1.3rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        html.dark body {
            background: #0b1120;
            color: #e5e7eb;
        }

        html.dark .card {
            background: #111827;
            border-color: #1f2937;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        html.dark .icon-wrap {
            background: rgba(59, 130, 246, 0.15);
        }

        html.dark h1 {
            color: #f1f5f9;
        }

        html.dark p {
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M1 1l22 22"></path>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
        </div>
        <h1>Tidak Ada Koneksi Internet</h1>
        <p>Halaman ini belum pernah dibuka sebelumnya sehingga tidak tersedia secara offline. Sambungkan kembali ke
            internet lalu coba muat ulang.</p>
        <button onclick="location.reload()">Coba Lagi</button>
    </div>
</body>

</html>
